name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: pip install ruff black mypy
      
    - name: Run ruff
      run: ruff check mcp_servers/
      
    - name: Run black
      run: black --check mcp_servers/
      
    - name: Run mypy
      run: mypy mcp_servers/ || true

  opencode-validate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Validate OpenCode JSON
      run: |
        python -c "import json; json.load(open('.opencode/opencode.json'))"
        echo "✓ opencode.json is valid JSON"
        
    - name: Validate Agent definitions
      run: |
        for agent in automl-coordinator data-processor feature-engineer model-selector model-validator explainability viz-agent; do
          if [ -f ".opencode/agents/${agent}.md" ]; then
            echo "✓ Agent ${agent}.md exists"
          else
            echo "✗ Agent ${agent}.md missing"
            exit 1
          fi
        done
        
    - name: Validate Skill definitions
      run: |
        for skill in eda data-cleaning data-visualization geospatial-analysis feature-engineering model-training model-validation shap-analysis; do
          if [ -f ".opencode/skills/${skill}/SKILL.md" ]; then
            echo "✓ Skill ${skill}/SKILL.md exists"
          else
            echo "✗ Skill ${skill}/SKILL.md missing"
            exit 1
          fi
        done
