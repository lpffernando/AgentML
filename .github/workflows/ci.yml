name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install -e .
        pip install -r requirements-opencode.txt
        pip install pytest pytest-cov
        
    - name: Run tests
      run: |
        pytest tests/ -v --cov=adapter --cov-report=xml
        
    - name: Upload coverage
      if: matrix.python-version == '3.11'
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: pip install ruff black mypy
      
    - name: Run ruff
      run: ruff check adapter/ tests/
      
    - name: Run black
      run: black --check adapter/ tests/
      
    - name: Run mypy
      run: mypy adapter/ || true

  build-docker:
    runs-on: ubuntu-latest
    needs: [test, lint]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Docker image
      run: docker build -t automl-agent-opencode:${{ github.sha }} .
      
    - name: Test Docker image
      run: |
        docker run -d --name test-container automl-agent-opencode:${{ github.sha }}
        sleep 5
        docker logs test-container
        docker stop test-container
