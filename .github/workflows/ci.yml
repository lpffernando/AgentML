name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install -e .
        pip install -r requirements-opencode.txt
        pip install pytest pytest-cov
        
    - name: Run tests
      run: |
        pytest tests/ -v --cov=adapter --cov-report=xml
        
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: pip install ruff black mypy
      
    - name: Run ruff
      run: ruff check adapter/ core/ tests/
      
    - name: Run black
      run: black --check adapter/ core/ tests/
      
    - name: Run mypy
      run: mypy adapter/ core/ || true

  opencode-validate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Validate OpenCode JSON
      run: |
        # Check if opencode.json is valid JSON
        python -c "import json; json.load(open('.opencode/opencode.json'))"
        echo "✓ opencode.json is valid JSON"
        
    - name: Validate Agent definitions
      run: |
        # Check required agent files exist
        for agent in automl-coordinator data-processor feature-engineer model-selector model-validator explainability; do
          if [ -f ".opencode/agents/${agent}.md" ]; then
            echo "✓ Agent ${agent}.md exists"
          else
            echo "✗ Agent ${agent}.md missing"
            exit 1
          fi
        done
        
    - name: Validate Skill definitions
      run: |
        # Check required skill directories exist
        for skill in data-cleaning feature-engineering model-training model-validation shap-analysis; do
          if [ -f ".opencode/skills/${skill}/SKILL.md" ]; then
            echo "✓ Skill ${skill}/SKILL.md exists"
          else
            echo "✗ Skill ${skill}/SKILL.md missing"
            exit 1
          fi
        done

  build-docker:
    runs-on: ubuntu-latest
    needs: [test, lint, opencode-validate]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Docker image
      run: docker build -t agentml:${{ github.sha }} .
      
    - name: Test Docker image
      run: |
        docker run -d --name test-container agentml:${{ github.sha }}
        sleep 5
        docker logs test-container
        docker stop test-container
