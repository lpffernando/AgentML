version: '3.8'

services:
  agentml:
    build: .
    container_name: agentml
    volumes:
      - ./data:/app/data
      - ./workspace:/workspace
      - ./agent_workspace:/app/agent_workspace
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ATLAS_TOKEN=${ATLAS_TOKEN:-}
      - WORKSPACE=/workspace
    stdin_open: true
    tty: true
    command: /bin/bash

  # Optional: MLflow tracking server
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: agentml-mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    environment:
      - MLFLOW_BACKEND_STORE=sqlite:///mlflow/mlflow.db
    profiles:
      - mlflow

  # Optional: Jupyter for development
  jupyter:
    image: jupyter/scipy-notebook:latest
    container_name: agentml-jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./data:/home/jovyan/data
      - ./workspace:/home/jovyan/workspace
    environment:
      - JUPYTER_TOKEN=agentml
    profiles:
      - dev

volumes:
  mlflow_data:
